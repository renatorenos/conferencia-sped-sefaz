name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'          # dispara ao criar uma tag, ex: v1.0.0
  workflow_dispatch:  # ou manualmente pelo painel do GitHub

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter xlrd openpyxl pyinstaller

      - name: Gerar executável
        run: |
          pyinstaller conferencia_sped.spec --clean --noconfirm

      - name: Upload do .exe como artefato
        uses: actions/upload-artifact@v4
        with:
          name: ConferenciaSPED-Windows
          path: dist/ConferenciaSPED.exe
          retention-days: 30

      - name: Criar Release (apenas em tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ConferenciaSPED.exe
